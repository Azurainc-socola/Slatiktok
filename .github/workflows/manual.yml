name: TikTok SLA Bot Auto Run

# 1. THIẾT LẬP LỊCH CHẠY (Trigger)
on:
  schedule:
    # Chạy lúc 05:45 sáng giờ VN (tương ứng 22:45 UTC hôm trước)
    - cron: '45 22 * * *'
    # Chạy lúc 09:45 sáng giờ VN (tương ứng 02:45 UTC)
    - cron: '45 2 * * *'
  
  # Cho phép bấm nút "Run workflow" chạy bằng tay trên web GitHub (Rất hữu ích khi cần test)
  workflow_dispatch: 

# 2. CÁC BƯỚC THỰC THI (Jobs)
jobs:
  run-bot-job:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code từ repo của bạn về máy chủ GitHub
      - name: Checkout repository
        uses: actions/checkout@v4

      # Bước 2: Cài đặt môi trường Python (Version 3.10 ổn định nhất)
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # Bước 3: Cài đặt các thư viện cần thiết từ file requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Bước 4: Chạy file script chính của bạn (main_app.py)
      - name: Run main application
        env:
          # Lấy các khóa bí mật từ GitHub Secrets đưa vào môi trường để code Python đọc được
          TRACK17_API_KEY: ${{ secrets.TRACK17_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GCP_JSON: ${{ secrets.GCP_JSON }}
        run: python main_app.py
