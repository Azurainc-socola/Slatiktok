name: 🚀 Azura 17Track Sync (Vietnam Time Schedule)

on:
  # Cho phép bấm nút chạy bằng tay bất cứ lúc nào
  workflow_dispatch:

  # Lịch chạy tự động (GitHub dùng giờ UTC = Giờ VN - 7 tiếng)
  schedule:
    # Chạy vào các khung giờ: 08:00, 11:00, 16:00 (Giờ VN) -> Mode: Register
    # Tương ứng UTC: 01:00, 04:00, 09:00
    - cron: '0 1,4,9 * * *'
    
    # Chạy vào các khung giờ: 08:30, 11:30, 16:30 (Giờ VN) -> Mode: Track
    # Tương ứng UTC: 01:30, 04:30, 09:30
    - cron: '30 1,4,9 * * *'

jobs:
  execute-vibe-logic:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt

      - name: 🏃 Run Script with Auto-Mode
        env:
          TRACK17_API_KEY: ${{ secrets.TRACK17_API_KEY }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          GCP_JSON: ${{ secrets.GCP_JSON }}
        run: |
          # Lấy phút hiện tại theo múi giờ Việt Nam
          VN_MINUTE=$(TZ='Asia/Ho_Chi_Minh' date +%M)
          VN_HOUR=$(TZ='Asia/Ho_Chi_Minh' date +%H)
          
          echo "⏰ Hiện tại là: $VN_HOUR:$VN_MINUTE (Giờ Việt Nam)"
          
          # Logic phân loại:
          # Nếu chạy đúng vào phút 00 (8h, 11h, 16h) -> Chạy Register
          # Nếu chạy vào các phút khác (thường là phút 30) -> Chạy Track
          if [ "$VN_MINUTE" == "00" ]; then
            echo "🎬 ACTION: Chạy phiên REGISTER cho mã mới..."
            python app.py --mode register
          else
            echo "🎬 ACTION: Chạy phiên TRACK cho mã đã register..."
            python app.py --mode track
          fi
